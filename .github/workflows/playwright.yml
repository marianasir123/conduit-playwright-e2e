name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:chromium
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://conduit.bondaracademy.com' }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Generate test report summary
        if: always()
        run: npm run report:generate

      - name: Publish summary to GitHub job results
        if: always()
        run: cat test-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish test results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Results
          path: test-results/results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test summary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-report
          path: |
            test-results/summary.md
            test-results/summary.html
            test-results/results.json
            test-results/results.xml
          retention-days: 14

      - name: Upload test results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
